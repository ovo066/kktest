<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="starGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="40%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <linearGradient id="starHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFECB3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="starDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E1" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFE082" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="60" cy="58" r="48" fill="url(#glow)"/>
  <!-- Star shadow -->
  <polygon points="60,14 72,46 106,48 80,70 88,102 60,84 32,102 40,70 14,48 48,46"
           fill="#E65100" opacity="0.1" transform="translate(2,3)"/>
  <!-- Star main body -->
  <polygon points="60,14 72,46 106,48 80,70 88,102 60,84 32,102 40,70 14,48 48,46"
           fill="url(#starGold)"/>
  <!-- Star upper highlight -->
  <polygon points="60,14 72,46 106,48 80,70 60,58 40,70 14,48 48,46"
           fill="url(#starHighlight)" opacity="0.5"/>
  <!-- Star bottom shadow facets -->
  <polygon points="80,70 88,102 60,84 60,58" fill="url(#starDark)" opacity="0.2"/>
  <polygon points="40,70 32,102 60,84 60,58" fill="url(#starDark)" opacity="0.15"/>
  <!-- Center glow -->
  <circle cx="60" cy="58" r="14" fill="#FFF8E1" opacity="0.3"/>
  <circle cx="60" cy="58" r="8" fill="#FFFDE7" opacity="0.25"/>
  <!-- Sparkle accents -->
  <g fill="white" opacity="0.7">
    <!-- Top sparkle -->
    <polygon points="60,8 61,12 62,8 61,4"/>
    <!-- Right sparkle -->
    <polygon points="110,48 106,49 110,50 114,49"/>
    <!-- Left sparkle -->
    <polygon points="10,48 14,49 10,50 6,49"/>
  </g>
  <!-- Small star sparkles around -->
  <polygon points="96,24 97.5,20 99,24 97.5,28" fill="#FFD54F" opacity="0.6"/>
  <polygon points="22,26 23.5,22 25,26 23.5,30" fill="#FFD54F" opacity="0.5"/>
  <polygon points="98,80 99.5,76 101,80 99.5,84" fill="#FFD54F" opacity="0.4"/>
  <polygon points="20,78 21.5,74 23,78 21.5,82" fill="#FFD54F" opacity="0.4"/>
  <!-- Edge highlight stroke -->
  <polygon points="60,14 72,46 106,48 80,70 88,102 60,84 32,102 40,70 14,48 48,46"
           fill="none" stroke="#FFECB3" stroke-width="1" opacity="0.5"/>
</svg>